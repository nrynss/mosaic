name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    name: Go quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run quality gate
        run: go run ./cmd/mosaic quality
