services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mosaic
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic -d mosaic"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosaic:
    build:
      context: .
      dockerfile: Dockerfile
    image: mosaic-demo:local
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MOSAIC_PORT:-8080}:8080"
    # Root .env is used for ${…} interpolation (OPENAI_API_KEY, etc.).
    # Providers default to live; without a key the process still falls back to
    # fixture at runtime. Billing balance is unrelated to mode selection.
    environment:
      MOSAIC_LISTEN_ADDR: ":8080"
      # Default: the local `db` container. Override with a Supabase DSN in .env
      # (MOSAIC_DB_PATH=postgres://…@db.<ref>.supabase.co:5432/postgres?sslmode=require)
      # to share ONE database with the Cloud Run demo — data generated locally
      # then shows up in the deployed app, and vice versa.
      MOSAIC_DB_PATH: "${MOSAIC_DB_PATH:-postgres://mosaic:mosaic@db:5432/mosaic?sslmode=disable}"
      MOSAIC_UI_DIR: "/srv/mosaic/ui"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      MOSAIC_LUNA_PROVIDER: "${MOSAIC_LUNA_PROVIDER:-live}"
      MOSAIC_TERRA_PROVIDER: "${MOSAIC_TERRA_PROVIDER:-live}"
      MOSAIC_SOL_PROVIDER: "${MOSAIC_SOL_PROVIDER:-live}"
      # Cassette modes (C5): live|fixture|replay — process-level only, not UI.
      # Default live for end-to-end demos; without OPENAI_API_KEY agents demote
      # to fixture clients. Recordings land under /tmp (read-only rootfs).
      MOSAIC_SIM_MODE: "${MOSAIC_SIM_MODE:-live}"
      MOSAIC_CASSETTE_DIR: "${MOSAIC_CASSETTE_DIR:-/tmp/mosaic-recordings}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  postgres-data:
